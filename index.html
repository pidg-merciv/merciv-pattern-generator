<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Pattern Generator</title>
    <style>
        @font-face {
            font-family: 'GT Pressura';
            src: url('https://cdn.jsdelivr.net/gh/fonts/GT-Pressura@main/GT-Pressura-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Die Grotesk';
            src: url('https://fonts.cdnfonts.com/s/91102/Die%20Grotesk%20Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Die Grotesk';
            src: url('https://fonts.cdnfonts.com/s/91102/Die%20Grotesk%20Bold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Die Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #F2F2ED;
            min-height: 100vh;
            padding: 32px 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 32px;
            align-items: start;
        }

        .controls {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 1px 3px rgba(13,13,12,0.04);
            height: fit-content;
            position: sticky;
            top: 32px;
            border: 1px solid #E5E5DF;
        }

        h1 {
            font-family: 'GT Pressura', 'Die Grotesk', sans-serif;
            font-size: 32px;
            margin-bottom: 28px;
            color: #1A1917;
            font-weight: 400;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .control-group {
            margin-bottom: 28px;
        }

        .control-group:last-of-type {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 400;
            color: #4D4C48;
            margin-bottom: 10px;
            letter-spacing: 0;
            line-height: 1.4;
        }

        .label-hint {
            font-size: 12px;
            color: #99988F;
            font-weight: 400;
            margin-left: 6px;
        }

        input[type="range"] {
            width: 100%;
            height: 20px;
            border-radius: 3px;
            background: transparent;
            outline: none;
            -webkit-appearance: none;
            transition: background 0.15s ease;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #CCCBC4;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #FFFFFF;
            cursor: pointer;
            border: 3px solid #ED4421;
            box-shadow: 0 2px 4px rgba(13,13,12,0.1), 0 1px 2px rgba(13,13,12,0.06);
            transition: all 0.15s ease;
            margin-top: -7px;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 8px rgba(237,68,33,0.3), 0 2px 4px rgba(13,13,12,0.1);
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #FFFFFF;
            cursor: pointer;
            border: 3px solid #ED4421;
            box-shadow: 0 2px 4px rgba(13,13,12,0.1), 0 1px 2px rgba(13,13,12,0.06);
            transition: all 0.15s ease;
        }

        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 8px rgba(237,68,33,0.3), 0 2px 4px rgba(13,13,12,0.1);
        }

        input[type="range"]::-moz-range-track {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #CCCBC4;
        }

        .dimension-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .dimension-input-wrapper {
            display: flex;
            flex-direction: column;
        }

        .dimension-label {
            font-size: 12px;
            font-weight: 400;
            color: #7F7E77;
            margin-bottom: 6px;
            letter-spacing: 0;
            line-height: 1.4;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #CCCBC4;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.15s ease;
            background: #FAF9F5;
            color: #1A1917;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #ED4421;
            background: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(237,68,33,0.1);
        }

        input[type="color"] {
            width: 100%;
            height: 42px;
            border: 1.5px solid #CCCBC4;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            padding: 4px;
            background: #FAF9F5;
        }

        input[type="color"]:hover {
            border-color: #ED4421;
        }

        .value-display {
            display: inline-block;
            float: right;
            font-size: 14px;
            color: #7F7E77;
            font-weight: 400;
            font-feature-settings: 'tnum';
            letter-spacing: 0;
            line-height: 1.4;
        }

        .color-input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .color-input-wrapper {
            display: flex;
            flex-direction: column;
        }

        .color-label {
            font-size: 12px;
            font-weight: 400;
            color: #7F7E77;
            margin-bottom: 6px;
            letter-spacing: 0;
            line-height: 1.4;
        }

        button {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-family: 'Die Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 16px;
            font-weight: 400;
            cursor: pointer;
            transition: background-color 0.15s ease, opacity 0.15s ease;
            letter-spacing: 0;
            line-height: 1.4;
        }

        .btn-primary {
            background: #ED4421;
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background: #FF5E3D;
        }

        .btn-primary:active {
            opacity: 0.9;
        }

        .btn-secondary {
            background: #E5E5DF;
            color: #1A1917;
        }

        .btn-secondary:hover {
            background: #CCCBC4;
        }

        .btn-secondary:active {
            opacity: 0.9;
        }

        .canvas-container {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 1px 3px rgba(13,13,12,0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #E5E5DF;
            position: relative;
        }

        .canvas-wrapper {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(13,13,12,0.06);
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            transition: opacity 0.2s ease;
            transform-origin: center center;
        }

        .canvas.updating {
            opacity: 0.7;
        }

        .canvas-info {
            font-size: 14px;
            color: #99988F;
            font-weight: 400;
            letter-spacing: 0;
            line-height: 1.4;
            margin-top: 24px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        .export-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #f3f4f6;
        }

        .export-label {
            font-size: 12px;
            font-weight: 400;
            color: #7F7E77;
            margin-bottom: 10px;
            letter-spacing: 0;
            line-height: 1.4;
        }

        .export-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .divider {
            height: 1px;
            background: #E5E5DF;
            margin: 28px 0;
        }

        .toggle-group {
            display: flex;
            background: #FAF9F5;
            border: 1.5px solid #CCCBC4;
            border-radius: 8px;
            padding: 3px;
            gap: 3px;
        }

        .toggle-button {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-family: 'Die Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.15s ease;
            background: transparent;
            color: #7F7E77;
        }

        .toggle-button.active {
            background: #FFFFFF;
            color: #1A1917;
            box-shadow: 0 1px 2px rgba(13,13,12,0.1);
        }

        .toggle-button:hover:not(.active) {
            color: #1A1917;
        }

        .color-presets {
            margin-top: 16px;
        }

        .preset-label {
            font-size: 12px;
            font-weight: 400;
            color: #7F7E77;
            margin-bottom: 8px;
            letter-spacing: 0;
            line-height: 1.4;
        }

        .preset-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .preset-button {
            width: 100%;
            height: 36px;
            border: 1.5px solid #CCCBC4;
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.15s ease, opacity 0.15s ease;
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        .preset-button:hover {
            border-color: #ED4421;
        }

        .preset-button:active {
            opacity: 0.9;
        }

        .preset-colors {
            display: flex;
            height: 100%;
        }

        .preset-fg, .preset-bg {
            flex: 1;
        }

        .toggle-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            background: #F2F2ED;
            padding: 4px;
            border-radius: 8px;
        }

        .toggle-button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-family: 'Die Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: background-color 0.15s ease, color 0.15s ease;
            letter-spacing: 0;
            line-height: 1.4;
            background: transparent;
            color: #7F7E77;
        }

        .toggle-button.active {
            background: #FFFFFF;
            color: #1A1917;
            box-shadow: 0 1px 2px rgba(13,13,12,0.04);
        }

        .toggle-button:hover:not(.active) {
            color: #4D4C48;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .controls {
                position: relative;
                top: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="controls">
            <h1>Pattern Generator</h1>
            
            <div class="control-group">
                <label>Pattern mode</label>
                <div class="toggle-group">
                    <button class="toggle-button active" id="toggleDots" data-mode="dots">Dots</button>
                    <button class="toggle-button" id="toggleBars" data-mode="bars">Bars</button>
                </div>
            </div>

            <div class="control-group">
                <label>
                    <span id="sizeLabel">Dot size</span>
                    <span class="value-display" id="sizeValue">8px</span>
                </label>
                <input type="range" id="dotSize" min="2" max="30" value="8" step="1">
            </div>

            <div class="control-group">
                <label>
                    Density
                    <span class="value-display" id="densityValue">45%</span>
                </label>
                <input type="range" id="density" min="0" max="100" value="45" step="1">
            </div>

            <div class="control-group" id="variationControl" style="display: none;">
                <label>
                    Variation
                    <span class="value-display" id="variationValue">100%</span>
                </label>
                <input type="range" id="variation" min="0" max="100" value="100" step="1">
            </div>

            <div class="control-group">
                <label>
                    Seed
                    <span class="value-display" id="seedValue">12</span>
                </label>
                <input type="range" id="seed" min="1" max="100" value="12" step="1">
            </div>

            <div class="control-group">
                <label>Dimensions</label>
                <div class="dimension-inputs">
                    <div class="dimension-input-wrapper">
                        <span class="dimension-label">Width</span>
                        <input type="number" id="canvasWidth" value="800" min="100" max="4000" step="100">
                    </div>
                    <div class="dimension-input-wrapper">
                        <span class="dimension-label">Height</span>
                        <input type="number" id="canvasHeight" value="800" min="100" max="4000" step="100">
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <div class="control-group">
                <label>Colors</label>
                <div class="color-input-group">
                    <div class="color-input-wrapper">
                        <span class="color-label" id="fgColorLabel">Dots</span>
                        <input type="color" id="foregroundColor" value="#FF5E3D">
                    </div>
                    <div class="color-input-wrapper">
                        <span class="color-label">Background</span>
                        <input type="color" id="backgroundColor" value="#ED4421">
                    </div>
                </div>
                <div class="color-presets">
                    <span class="preset-label">Brand presets</span>
                    <div class="preset-grid">
                        <button class="preset-button" data-fg="#7C3648" data-bg="#572330" title="Orange 30 on 20">
                            <div class="preset-colors">
                                <div class="preset-fg" style="background: #7C3648;"></div>
                                <div class="preset-bg" style="background: #572330;"></div>
                            </div>
                        </button>
                        <button class="preset-button" data-fg="#FF5E3D" data-bg="#ED4421" title="Orange 60 on 50">
                            <div class="preset-colors">
                                <div class="preset-fg" style="background: #FF5E3D;"></div>
                                <div class="preset-bg" style="background: #ED4421;"></div>
                            </div>
                        </button>
                        <button class="preset-button" data-fg="#FFCABD" data-bg="#FFA894" title="Orange 90 on 80">
                            <div class="preset-colors">
                                <div class="preset-fg" style="background: #FFCABD;"></div>
                                <div class="preset-bg" style="background: #FFA894;"></div>
                            </div>
                        </button>
                        <button class="preset-button" data-fg="#33332F" data-bg="#1A1917" title="Neutral 20 on 10">
                            <div class="preset-colors">
                                <div class="preset-fg" style="background: #33332F;"></div>
                                <div class="preset-bg" style="background: #1A1917;"></div>
                            </div>
                        </button>
                        <button class="preset-button" data-fg="#1E5F6B" data-bg="#143F47" title="Blue 30 on 20">
                            <div class="preset-colors">
                                <div class="preset-fg" style="background: #1E5F6B;"></div>
                                <div class="preset-bg" style="background: #143F47;"></div>
                            </div>
                        </button>
                        <button class="preset-button" data-fg="#36ADC4" data-bg="#089DBA" title="Blue 60 on 50">
                            <div class="preset-colors">
                                <div class="preset-fg" style="background: #36ADC4;"></div>
                                <div class="preset-bg" style="background: #089DBA;"></div>
                            </div>
                        </button>
                        <button class="preset-button" data-fg="#B3E8EF" data-bg="#83D7E2" title="Blue 90 on 80">
                            <div class="preset-colors">
                                <div class="preset-fg" style="background: #B3E8EF;"></div>
                                <div class="preset-bg" style="background: #83D7E2;"></div>
                            </div>
                        </button>
                        <button class="preset-button" data-fg="#E5E5DF" data-bg="#FAF9F5" title="Neutral 90 on 98">
                            <div class="preset-colors">
                                <div class="preset-fg" style="background: #E5E5DF;"></div>
                                <div class="preset-bg" style="background: #FAF9F5;"></div>
                            </div>
                        </button>
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <div class="button-group">
                <button class="btn-primary" id="randomize">Shuffle</button>
            </div>

            <div class="export-section">
                <div class="export-label">Export pattern</div>
                <div class="export-buttons">
                    <button class="btn-secondary" id="downloadPNG">PNG</button>
                    <button class="btn-secondary" id="downloadSVG">SVG</button>
                </div>
            </div>
        </div>

        <div class="canvas-container">
            <div class="canvas-wrapper">
                <canvas id="patternCanvas"></canvas>
            </div>
            <div class="canvas-info">
                <span id="dotCount">0</span> <span id="elementType">dots</span> rendered
            </div>
        </div>
    </div>

    <script>
        class SeededRandom {
            constructor(seed) {
                this.seed = seed;
            }

            next() {
                this.seed = (this.seed * 9301 + 49297) % 233280;
                return this.seed / 233280;
            }
        }

        class PatternGenerator {
            constructor() {
                this.canvas = document.getElementById('patternCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.patternMode = 'dots'; // 'dots' or 'bars'
                this.initializeControls();
                this.generate();
            }

            initializeControls() {
                const dotSize = document.getElementById('dotSize');
                const density = document.getElementById('density');
                const seed = document.getElementById('seed');
                const canvasWidth = document.getElementById('canvasWidth');
                const canvasHeight = document.getElementById('canvasHeight');
                const foregroundColor = document.getElementById('foregroundColor');
                const backgroundColor = document.getElementById('backgroundColor');
                const toggleDots = document.getElementById('toggleDots');
                const toggleBars = document.getElementById('toggleBars');

                // Pattern mode toggle
                toggleDots.addEventListener('click', () => {
                    this.patternMode = 'dots';
                    toggleDots.classList.add('active');
                    toggleBars.classList.remove('active');
                    document.getElementById('variationControl').style.display = 'none';
                    this.updateLabels();
                    this.generate();
                });

                toggleBars.addEventListener('click', () => {
                    this.patternMode = 'bars';
                    toggleBars.classList.add('active');
                    toggleDots.classList.remove('active');
                    document.getElementById('variationControl').style.display = 'block';
                    this.updateLabels();
                    this.generate();
                });

                // Update value displays with units
                dotSize.addEventListener('input', (e) => {
                    document.getElementById('sizeValue').textContent = e.target.value + 'px';
                    this.generate();
                });

                density.addEventListener('input', (e) => {
                    document.getElementById('densityValue').textContent = e.target.value + '%';
                    this.generate();
                });

                seed.addEventListener('input', (e) => {
                    document.getElementById('seedValue').textContent = e.target.value;
                    this.generate();
                });

                // Variation control for bars
                const variation = document.getElementById('variation');
                variation.addEventListener('input', (e) => {
                    document.getElementById('variationValue').textContent = e.target.value + '%';
                    this.generate();
                });

                canvasWidth.addEventListener('input', () => this.generate());
                canvasHeight.addEventListener('input', () => this.generate());
                foregroundColor.addEventListener('input', () => this.generate());
                backgroundColor.addEventListener('input', () => this.generate());

                // Color preset buttons
                document.querySelectorAll('.preset-button').forEach(button => {
                    button.addEventListener('click', () => {
                        const fg = button.dataset.fg;
                        const bg = button.dataset.bg;
                        foregroundColor.value = fg;
                        backgroundColor.value = bg;
                        this.generate();
                    });
                });

                // Shuffle button - randomizes dot size, density, and seed
                document.getElementById('randomize').addEventListener('click', () => {
                    const randomDotSize = Math.floor(Math.random() * 29) + 2; // 2-30
                    const randomDensity = Math.floor(Math.random() * 101); // 0-100
                    const randomSeed = Math.floor(Math.random() * 100) + 1; // 1-100
                    
                    dotSize.value = randomDotSize;
                    density.value = randomDensity;
                    seed.value = randomSeed;
                    
                    document.getElementById('sizeValue').textContent = randomDotSize + 'px';
                    document.getElementById('densityValue').textContent = randomDensity + '%';
                    document.getElementById('seedValue').textContent = randomSeed;
                    
                    this.generate();
                });

                document.getElementById('downloadPNG').addEventListener('click', () => this.downloadPNG());
                document.getElementById('downloadSVG').addEventListener('click', () => this.downloadSVG());

                // Keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    // Space or R for shuffle (randomize all parameters)
                    if ((e.code === 'Space' || e.key === 'r') && !e.target.matches('input')) {
                        e.preventDefault();
                        const randomDotSize = Math.floor(Math.random() * 29) + 2; // 2-30
                        const randomDensity = Math.floor(Math.random() * 101); // 0-100
                        const randomSeed = Math.floor(Math.random() * 100) + 1; // 1-100
                        
                        dotSize.value = randomDotSize;
                        density.value = randomDensity;
                        seed.value = randomSeed;
                        
                        document.getElementById('sizeValue').textContent = randomDotSize + 'px';
                        document.getElementById('densityValue').textContent = randomDensity + '%';
                        document.getElementById('seedValue').textContent = randomSeed;
                        
                        this.generate();
                    }
                    // P for PNG download
                    if (e.key === 'p' && (e.metaKey || e.ctrlKey)) {
                        e.preventDefault();
                        this.downloadPNG();
                    }
                    // S for SVG download
                    if (e.key === 's' && (e.metaKey || e.ctrlKey)) {
                        e.preventDefault();
                        this.downloadSVG();
                    }
                });
            }

            updateLabels() {
                if (this.patternMode === 'dots') {
                    document.getElementById('sizeLabel').textContent = 'Dot size';
                    document.getElementById('fgColorLabel').textContent = 'Dots';
                    document.getElementById('elementType').textContent = 'dots';
                } else {
                    document.getElementById('sizeLabel').textContent = 'Bar width';
                    document.getElementById('fgColorLabel').textContent = 'Bars';
                    document.getElementById('elementType').textContent = 'bars';
                }
            }

            generate() {
                if (this.patternMode === 'dots') {
                    this.generateDots();
                } else {
                    this.generateBars();
                }
            }

            generateDots() {
                const dotSize = parseInt(document.getElementById('dotSize').value);
                const density = parseInt(document.getElementById('density').value) / 100;
                const seed = parseInt(document.getElementById('seed').value);
                const foregroundColor = document.getElementById('foregroundColor').value;
                const backgroundColor = document.getElementById('backgroundColor').value;
                const canvasWidth = parseInt(document.getElementById('canvasWidth').value);
                const canvasHeight = parseInt(document.getElementById('canvasHeight').value);

                // Add updating class for transition
                this.canvas.classList.add('updating');

                // Small delay for visual feedback
                setTimeout(() => {
                    // Set canvas to actual dimensions
                    this.canvas.width = canvasWidth;
                    this.canvas.height = canvasHeight;

                    // Fill background
                    this.ctx.fillStyle = backgroundColor;
                    this.ctx.fillRect(0, 0, canvasWidth, canvasHeight);

                    // Calculate grid spacing
                    const spacing = dotSize * 2;
                    const radius = dotSize / 2;

                    // Calculate grid dimensions to center the pattern
                    const cols = Math.floor(canvasWidth / spacing);
                    const rows = Math.floor(canvasHeight / spacing);
                    const gridWidth = cols * spacing;
                    const gridHeight = rows * spacing;
                    const offsetX = (canvasWidth - gridWidth) / 2 + radius;
                    const offsetY = (canvasHeight - gridHeight) / 2 + radius;

                    // Initialize seeded random number generator
                    const rng = new SeededRandom(seed);

                    // Draw dots
                    let dotCount = 0;
                    this.ctx.fillStyle = foregroundColor;

                    for (let row = 0; row < rows; row++) {
                        for (let col = 0; col < cols; col++) {
                            if (rng.next() < density) {
                                const x = offsetX + col * spacing;
                                const y = offsetY + row * spacing;
                                this.ctx.beginPath();
                                this.ctx.arc(x, y, radius, 0, Math.PI * 2);
                                this.ctx.fill();
                                dotCount++;
                            }
                        }
                    }

                    // Scale canvas display to fit container width
                    const wrapper = this.canvas.parentElement;
                    const maxWidth = wrapper.clientWidth;
                    
                    if (canvasWidth > maxWidth) {
                        const scale = maxWidth / canvasWidth;
                        this.canvas.style.width = maxWidth + 'px';
                        this.canvas.style.height = (canvasHeight * scale) + 'px';
                    } else {
                        this.canvas.style.width = canvasWidth + 'px';
                        this.canvas.style.height = canvasHeight + 'px';
                    }

                    document.getElementById('dotCount').textContent = dotCount.toLocaleString();
                    this.canvas.classList.remove('updating');
                }, 50);
            }

            generateBars() {
                const barWidth = parseInt(document.getElementById('dotSize').value);
                const density = parseInt(document.getElementById('density').value) / 100;
                const variation = parseInt(document.getElementById('variation').value) / 100;
                const seed = parseInt(document.getElementById('seed').value);
                const foregroundColor = document.getElementById('foregroundColor').value;
                const backgroundColor = document.getElementById('backgroundColor').value;
                const canvasWidth = parseInt(document.getElementById('canvasWidth').value);
                const canvasHeight = parseInt(document.getElementById('canvasHeight').value);

                // Add updating class for transition
                this.canvas.classList.add('updating');

                // Small delay for visual feedback
                setTimeout(() => {
                    // Set canvas to actual dimensions
                    this.canvas.width = canvasWidth;
                    this.canvas.height = canvasHeight;

                    // Fill background
                    this.ctx.fillStyle = backgroundColor;
                    this.ctx.fillRect(0, 0, canvasWidth, canvasHeight);

                    // Calculate grid spacing (gap = bar width)
                    const spacing = barWidth * 2;
                    const cornerRadius = barWidth * 0.2125556105;

                    // Calculate grid dimensions to center the pattern
                    const cols = Math.floor(canvasWidth / spacing);
                    const rows = Math.floor((canvasHeight / spacing) * 3);
                    const gridWidth = cols * spacing;
                    const offsetX = (canvasWidth - gridWidth) / 2 + barWidth / 2;

                    // Initialize seeded random number generator
                    const rng = new SeededRandom(seed);

                    // Draw bars
                    let barCount = 0;
                    this.ctx.fillStyle = foregroundColor;

                    for (let col = 0; col < cols; col++) {
                        const x = offsetX + col * spacing;
                        let currentY = barWidth / 2;

                        while (currentY < canvasHeight) {
                            if (rng.next() < density) {
                                // Calculate bar length based on variation
                                // 0% variation = 1 unit (square/pill)
                                // 100% variation = 1-6 units (full range)
                                const minUnits = 1;
                                const maxUnits = 1 + Math.floor(variation * 5);
                                const lengthUnits = minUnits + Math.floor(rng.next() * (maxUnits - minUnits + 1));
                                const barHeight = barWidth * lengthUnits;

                                // Draw rounded rectangle
                                this.drawRoundedRect(x - barWidth / 2, currentY, barWidth, barHeight, cornerRadius);
                                barCount++;

                                currentY += barHeight + barWidth;
                            } else {
                                // Skip one unit when density check fails
                                currentY += barWidth * 2;
                            }
                        }
                    }

                    // Scale canvas display to fit container width
                    const wrapper = this.canvas.parentElement;
                    const maxWidth = wrapper.clientWidth;
                    
                    if (canvasWidth > maxWidth) {
                        const scale = maxWidth / canvasWidth;
                        this.canvas.style.width = maxWidth + 'px';
                        this.canvas.style.height = (canvasHeight * scale) + 'px';
                    } else {
                        this.canvas.style.width = canvasWidth + 'px';
                        this.canvas.style.height = canvasHeight + 'px';
                    }

                    document.getElementById('dotCount').textContent = barCount.toLocaleString();
                    this.canvas.classList.remove('updating');
                }, 50);
            }

            drawRoundedRect(x, y, width, height, radius) {
                this.ctx.beginPath();
                this.ctx.moveTo(x + radius, y);
                this.ctx.lineTo(x + width - radius, y);
                this.ctx.arcTo(x + width, y, x + width, y + radius, radius);
                this.ctx.lineTo(x + width, y + height - radius);
                this.ctx.arcTo(x + width, y + height, x + width - radius, y + height, radius);
                this.ctx.lineTo(x + radius, y + height);
                this.ctx.arcTo(x, y + height, x, y + height - radius, radius);
                this.ctx.lineTo(x, y + radius);
                this.ctx.arcTo(x, y, x + radius, y, radius);
                this.ctx.closePath();
                this.ctx.fill();
            }

            downloadPNG() {
                const seed = document.getElementById('seed').value;
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().slice(0, 10);
                link.download = `pattern-${timestamp}-${seed}.png`;
                link.href = this.canvas.toDataURL('image/png');
                link.click();
            }

            downloadSVG() {
                if (this.patternMode === 'dots') {
                    this.downloadDotsSVG();
                } else {
                    this.downloadBarsSVG();
                }
            }

            downloadDotsSVG() {
                const dotSize = parseInt(document.getElementById('dotSize').value);
                const density = parseInt(document.getElementById('density').value) / 100;
                const seed = parseInt(document.getElementById('seed').value);
                const foregroundColor = document.getElementById('foregroundColor').value;
                const backgroundColor = document.getElementById('backgroundColor').value;
                const canvasWidth = parseInt(document.getElementById('canvasWidth').value);
                const canvasHeight = parseInt(document.getElementById('canvasHeight').value);

                const spacing = dotSize * 2;
                const radius = dotSize / 2;

                // Calculate grid dimensions to center the pattern
                const cols = Math.floor(canvasWidth / spacing);
                const rows = Math.floor(canvasHeight / spacing);
                const gridWidth = cols * spacing;
                const gridHeight = rows * spacing;
                const offsetX = (canvasWidth - gridWidth) / 2 + radius;
                const offsetY = (canvasHeight - gridHeight) / 2 + radius;

                const rng = new SeededRandom(seed);

                let svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg width="${canvasWidth}" height="${canvasHeight}" xmlns="http://www.w3.org/2000/svg">
    <rect width="${canvasWidth}" height="${canvasHeight}" fill="${backgroundColor}"/>
    <g fill="${foregroundColor}">`;

                for (let row = 0; row < rows; row++) {
                    for (let col = 0; col < cols; col++) {
                        if (rng.next() < density) {
                            const x = offsetX + col * spacing;
                            const y = offsetY + row * spacing;
                            svg += `\n        <circle cx="${x}" cy="${y}" r="${radius}"/>`;
                        }
                    }
                }

                svg += `\n    </g>
</svg>`;

                const blob = new Blob([svg], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().slice(0, 10);
                link.download = `pattern-${timestamp}-${seed}.svg`;
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
            }

            downloadBarsSVG() {
                const barWidth = parseInt(document.getElementById('dotSize').value);
                const density = parseInt(document.getElementById('density').value) / 100;
                const variation = parseInt(document.getElementById('variation').value) / 100;
                const seed = parseInt(document.getElementById('seed').value);
                const foregroundColor = document.getElementById('foregroundColor').value;
                const backgroundColor = document.getElementById('backgroundColor').value;
                const canvasWidth = parseInt(document.getElementById('canvasWidth').value);
                const canvasHeight = parseInt(document.getElementById('canvasHeight').value);

                const spacing = barWidth * 2;
                const cornerRadius = barWidth * 0.2125556105;

                const cols = Math.floor(canvasWidth / spacing);
                const gridWidth = cols * spacing;
                const offsetX = (canvasWidth - gridWidth) / 2 + barWidth / 2;

                const rng = new SeededRandom(seed);

                let svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg width="${canvasWidth}" height="${canvasHeight}" xmlns="http://www.w3.org/2000/svg">
    <rect width="${canvasWidth}" height="${canvasHeight}" fill="${backgroundColor}"/>
    <g fill="${foregroundColor}">`;

                for (let col = 0; col < cols; col++) {
                    const x = offsetX + col * spacing;
                    let currentY = barWidth / 2;

                    while (currentY < canvasHeight) {
                        if (rng.next() < density) {
                            const minUnits = 1;
                            const maxUnits = 1 + Math.floor(variation * 5);
                            const lengthUnits = minUnits + Math.floor(rng.next() * (maxUnits - minUnits + 1));
                            const barHeight = barWidth * lengthUnits;
                            const rx = x - barWidth / 2;
                            const ry = currentY;

                            svg += `\n        <rect x="${rx}" y="${ry}" width="${barWidth}" height="${barHeight}" rx="${cornerRadius}" ry="${cornerRadius}"/>`;

                            currentY += barHeight + barWidth;
                        } else {
                            currentY += barWidth * 2;
                        }
                    }
                }

                svg += `\n    </g>
</svg>`;

                const blob = new Blob([svg], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().slice(0, 10);
                link.download = `pattern-${timestamp}-${seed}.svg`;
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
            }
        }

        // Initialize the pattern generator
        new PatternGenerator();
    </script>
</body>
