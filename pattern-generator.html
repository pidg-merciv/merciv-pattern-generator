<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Pattern Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        .controls {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 24px;
            color: #333;
        }

        .control-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #639097;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #639097;
            cursor: pointer;
            border: none;
        }

        input[type="number"], input[type="color"], input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="color"] {
            height: 45px;
            cursor: pointer;
        }

        .value-display {
            display: inline-block;
            float: right;
            font-size: 13px;
            color: #888;
            font-weight: normal;
        }

        .color-input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .color-input-wrapper {
            display: flex;
            flex-direction: column;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #639097;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        button:hover {
            background: #527980;
        }

        button:active {
            transform: scale(0.98);
        }

        .canvas-container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            max-width: 100%;
            height: auto;
        }

        .canvas-info {
            margin-top: 16px;
            font-size: 13px;
            color: #888;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="controls">
            <h1>Pattern Controls</h1>
            
            <div class="control-group">
                <label>
                    Dot Size (px)
                    <span class="value-display" id="sizeValue">8</span>
                </label>
                <input type="range" id="dotSize" min="2" max="30" value="8" step="1">
            </div>

            <div class="control-group">
                <label>
                    Density (%)
                    <span class="value-display" id="densityValue">45</span>
                </label>
                <input type="range" id="density" min="0" max="100" value="45" step="1">
            </div>

            <div class="control-group">
                <label>Random Seed</label>
                <input type="number" id="seed" value="12345" step="1">
                <button id="randomizeSeed">Randomize Seed</button>
            </div>

            <div class="control-group">
                <label>Colors</label>
                <div class="color-input-group">
                    <div class="color-input-wrapper">
                        <label style="font-size: 11px; margin-bottom: 4px;">Foreground</label>
                        <input type="color" id="foregroundColor" value="#639097">
                    </div>
                    <div class="color-input-wrapper">
                        <label style="font-size: 11px; margin-bottom: 4px;">Background</label>
                        <input type="color" id="backgroundColor" value="#3E6166">
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>Canvas Size (px)</label>
                <input type="number" id="canvasSize" value="800" min="200" max="2400" step="100">
            </div>

            <div class="button-group">
                <button id="regenerate">Regenerate</button>
                <button id="downloadPNG">Download PNG</button>
            </div>
            <button id="downloadSVG">Download SVG</button>
        </div>

        <div class="canvas-container">
            <canvas id="patternCanvas"></canvas>
            <div class="canvas-info">
                <span id="dotCount">0</span> dots rendered
            </div>
        </div>
    </div>

    <script>
        class SeededRandom {
            constructor(seed) {
                this.seed = seed;
            }

            next() {
                this.seed = (this.seed * 9301 + 49297) % 233280;
                return this.seed / 233280;
            }
        }

        class PatternGenerator {
            constructor() {
                this.canvas = document.getElementById('patternCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.initializeControls();
                this.generate();
            }

            initializeControls() {
                const dotSize = document.getElementById('dotSize');
                const density = document.getElementById('density');
                const seed = document.getElementById('seed');
                const foregroundColor = document.getElementById('foregroundColor');
                const backgroundColor = document.getElementById('backgroundColor');
                const canvasSize = document.getElementById('canvasSize');

                dotSize.addEventListener('input', (e) => {
                    document.getElementById('sizeValue').textContent = e.target.value;
                    this.generate();
                });

                density.addEventListener('input', (e) => {
                    document.getElementById('densityValue').textContent = e.target.value;
                    this.generate();
                });

                seed.addEventListener('input', () => this.generate());
                foregroundColor.addEventListener('input', () => this.generate());
                backgroundColor.addEventListener('input', () => this.generate());
                canvasSize.addEventListener('input', () => this.generate());

                document.getElementById('randomizeSeed').addEventListener('click', () => {
                    seed.value = Math.floor(Math.random() * 1000000);
                    this.generate();
                });

                document.getElementById('regenerate').addEventListener('click', () => this.generate());
                document.getElementById('downloadPNG').addEventListener('click', () => this.downloadPNG());
                document.getElementById('downloadSVG').addEventListener('click', () => this.downloadSVG());
            }

            generate() {
                const dotSize = parseInt(document.getElementById('dotSize').value);
                const density = parseInt(document.getElementById('density').value) / 100;
                const seed = parseInt(document.getElementById('seed').value);
                const foregroundColor = document.getElementById('foregroundColor').value;
                const backgroundColor = document.getElementById('backgroundColor').value;
                const canvasSize = parseInt(document.getElementById('canvasSize').value);

                // Set canvas size
                this.canvas.width = canvasSize;
                this.canvas.height = canvasSize;

                // Fill background
                this.ctx.fillStyle = backgroundColor;
                this.ctx.fillRect(0, 0, canvasSize, canvasSize);

                // Calculate grid spacing (dot size + space between = 2 * dotSize)
                const spacing = dotSize * 2;
                const radius = dotSize / 2;

                // Initialize seeded random number generator
                const rng = new SeededRandom(seed);

                // Draw dots
                let dotCount = 0;
                this.ctx.fillStyle = foregroundColor;

                for (let y = radius; y < canvasSize; y += spacing) {
                    for (let x = radius; x < canvasSize; x += spacing) {
                        // Use density to determine if dot should be drawn
                        if (rng.next() < density) {
                            this.ctx.beginPath();
                            this.ctx.arc(x, y, radius, 0, Math.PI * 2);
                            this.ctx.fill();
                            dotCount++;
                        }
                    }
                }

                document.getElementById('dotCount').textContent = dotCount;
            }

            downloadPNG() {
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                link.download = `pattern-${timestamp}.png`;
                link.href = this.canvas.toDataURL('image/png');
                link.click();
            }

            downloadSVG() {
                const dotSize = parseInt(document.getElementById('dotSize').value);
                const density = parseInt(document.getElementById('density').value) / 100;
                const seed = parseInt(document.getElementById('seed').value);
                const foregroundColor = document.getElementById('foregroundColor').value;
                const backgroundColor = document.getElementById('backgroundColor').value;
                const canvasSize = parseInt(document.getElementById('canvasSize').value);

                const spacing = dotSize * 2;
                const radius = dotSize / 2;
                const rng = new SeededRandom(seed);

                let svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg width="${canvasSize}" height="${canvasSize}" xmlns="http://www.w3.org/2000/svg">
    <rect width="${canvasSize}" height="${canvasSize}" fill="${backgroundColor}"/>
    <g fill="${foregroundColor}">`;

                for (let y = radius; y < canvasSize; y += spacing) {
                    for (let x = radius; x < canvasSize; x += spacing) {
                        if (rng.next() < density) {
                            svg += `\n        <circle cx="${x}" cy="${y}" r="${radius}"/>`;
                        }
                    }
                }

                svg += `\n    </g>
</svg>`;

                const blob = new Blob([svg], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                link.download = `pattern-${timestamp}.svg`;
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
            }
        }

        // Initialize the pattern generator
        new PatternGenerator();
    </script>
</body>
</html>
